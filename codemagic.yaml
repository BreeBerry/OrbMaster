workflows:
  ios-release:
    name: OrbMaster iOS (App Store / TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # This name must EXACTLY match the App Store Connect API key you add in
      # Codemagic → Team settings → Integrations → Apple Developer Portal.
      app_store_connect: codemagic
    environment:
      groups:
        - ios_signing      # holds CERTIFICATE_PRIVATE_KEY (add this in Codemagic UI)
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.breezybee.orbmaster"
      node: 22
      xcode: latest          # newest Xcode = iOS 26 SDK (required by Apple)
      # Capacitor 8 uses Swift Package Manager for iOS deps — no CocoaPods needed.
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Generate the iOS project + copy web assets
        script: |
          set -e
          # Web app is static (www) — no build step needed.
          if [ ! -d "ios" ]; then npx cap add ios; fi   # create the iOS project
          npx cap sync ios                              # copy www + native plugins into the iOS project
      - name: Set the app icon
        script: |
          set -e
          # Replace Capacitor's placeholder icon with the OrbMaster icon (opaque 1024px).
          cp resources/ios-appicon-1024.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
      - name: Make the app iPhone-only
        script: |
          set -e
          # Portrait phone game — ship as iPhone-only so iPad screenshots aren't required.
          sed -i '' 's/TARGETED_DEVICE_FAMILY = [^;]*;/TARGETED_DEVICE_FAMILY = "1";/g' ios/App/App.xcodeproj/project.pbxproj
          grep -n "TARGETED_DEVICE_FAMILY" ios/App/App.xcodeproj/project.pbxproj
      - name: Lock the app to portrait
        script: |
          PL=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PL"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PL"
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PL"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$PL"
          # Portrait-only on iPad requires opting out of multitasking, or Apple rejects the upload.
          /usr/libexec/PlistBuddy -c "Delete :UIRequiresFullScreen" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$PL"
          # Export compliance: app uses only standard HTTPS encryption (exempt) — skips the TestFlight prompt.
          /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PL"
      - name: Set up code signing (auto-create cert + profile)
        script: |
          set -e
          keychain initialize
          # Reuses the distribution certificate tied to CERTIFICATE_PRIVATE_KEY,
          # creating it (and the profile) on the first run.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set version + build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $(($BUILD_NUMBER))
          agvtool new-marketing-version "1.11"
      - name: Build signed IPA
        script: |
          set -e
          cd $CM_BUILD_DIR/ios/App
          if [ -d "$XCODE_WORKSPACE" ]; then
            xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME" \
              --archive-flags="-destination 'generic/platform=iOS'"
          else
            xcode-project build-ipa --project "App.xcodeproj" --scheme "$XCODE_SCHEME" \
              --archive-flags="-destination 'generic/platform=iOS'"
          fi
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - breeberry211@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
