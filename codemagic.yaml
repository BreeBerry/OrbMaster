workflows:
  ios-release:
    name: OrbMaster iOS (App Store / TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # This name must EXACTLY match the App Store Connect API key you add in
      # Codemagic → Team settings → Integrations → Apple Developer Portal.
      app_store_connect: codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.breezybee.orbmaster"
      node: 22
      xcode: latest          # newest Xcode = iOS 26 SDK (required by Apple)
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Generate the iOS project + copy web assets
        script: |
          set -e
          # Web app is static (www) — no build step needed.
          if [ ! -d "ios" ]; then npx cap add ios; fi   # create the iOS project (also writes the Podfile)
          npx cap sync ios                              # copy www + native plugins into the iOS project
          echo "----- iOS project tree -----"
          ls -la ios && ls -la ios/App || true
          find ios -name Podfile
      - name: Lock the app to portrait
        script: |
          PL=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PL"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PL"
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PL"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$PL"
      - name: Install CocoaPods dependencies
        script: |
          set -e
          PODDIR=$(dirname "$(find ios -name Podfile | head -1)")
          echo "Installing pods in: $PODDIR"
          cd "$PODDIR"
          pod install --repo-update
      - name: Set up code signing (auto-create cert + profile)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set version + build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $(($BUILD_NUMBER))
          agvtool new-marketing-version "1.10"
      - name: Build signed IPA
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - breeberry211@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
